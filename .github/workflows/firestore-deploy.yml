name: Deploy Firestore (reglas e índices)

on:
  push:
    branches: [main, master]
    paths:
      - 'firebase/**'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/firestore-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools@13

      - name: Desplegar Firestore
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "::error::Falta el secret FIREBASE_TOKEN en el repositorio. Generá un token con: firebase login:ci"
            exit 1
          fi
          firebase deploy --only firestore --project webgardens-8655d --non-interactive
